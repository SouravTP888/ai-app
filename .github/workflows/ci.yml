name: AI LMS Automation Engine CI

on:
  push:
    branches: [ main, master, development ]
  pull_request:
    branches: [ main, master, development ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            ai-engine/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci || npm install

      - name: Install AI Engine Dependencies
        run: |
          cd ai-engine
          npm ci || npm install

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci || npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build
